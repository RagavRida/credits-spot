name: Refresh credits data

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Firecrawl refresh
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node scripts/refresh.mjs

      - name: Commit & push if data changed
        run: |
          if [[ -n "$(git status --porcelain data/programs.json)" ]]; then
            git config user.name "credits-spot-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/programs.json
            git commit -m "chore: refresh credits data ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No data changes."
          fi
